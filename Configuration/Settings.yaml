ZktSn0w:
    Inertia:
      assetVersioning:
        strategy:
          class: \ZktSn0w\Inertia\Domain\AssetVersion\SettingStrategy
          options:
            value: '1.0.0'
        # strategy:
        #   class: \Vendor.Site\Domain\AssetVersion\MyStrategy
        #   options:

      errorHandling:
        # Inertia component name to render for error pages (null = default "Error").
        # The matching component must exist on the client side.
        errorComponent: null
        # When true, error responses include file, line, and stack trace.
        # Disable in production to avoid leaking internals.
        showDetailedErrors: true

# Register Inertia Eel helper for Fusion expressions.
Neos:
  Fusion:
    defaultContext:
      Inertia: 'ZktSn0w\Inertia\Eel\InertiaHelper'
